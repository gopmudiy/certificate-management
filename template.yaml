AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CertAgent - AI-powered DigiCert certificate auto-renewal agent

Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 256
    Environment:
      Variables:
        DIGICERT_API_SECRET_ARN: !Ref DigiCertApiKeySecret
        CERT_TABLE_NAME: !Ref CertInventoryTable
        CERT_SECRETS_PREFIX: /certagent/certs
        NOTIFICATION_TOPIC_ARN: !Ref NotificationTopic

Parameters:
  ExpiryThresholdDays:
    Type: Number
    Default: 30
    Description: Alert when certs expire within this many days
  DigiCertBaseUrl:
    Type: String
    Default: https://www.digicert.com/services/v2
    Description: DigiCert CertCentral API base URL

Resources:
  # ─── Secrets ───────────────────────────────────────────────
  DigiCertApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /certagent/digicert-api-key
      Description: DigiCert CertCentral API key
      SecretString: '{"api_key": "REPLACE_WITH_YOUR_API_KEY"}'

  # ─── DynamoDB ──────────────────────────────────────────────
  CertInventoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: certagent-inventory
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: domain
          AttributeType: S
        - AttributeName: order_id
          AttributeType: S
      KeySchema:
        - AttributeName: domain
          KeyType: HASH
        - AttributeName: order_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ─── SNS ───────────────────────────────────────────────────
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: certagent-notifications

  # ─── Lambda Functions ──────────────────────────────────────
  ScanCertificatesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: certagent-scan-certificates
      CodeUri: lambdas/scan_certificates/
      Handler: handler.lambda_handler
      Environment:
        Variables:
          DIGICERT_BASE_URL: !Ref DigiCertBaseUrl
          EXPIRY_THRESHOLD_DAYS: !Ref ExpiryThresholdDays
      Policies:
        - SecretsManagerReadWrite
        - DynamoDBCrudPolicy:
            TableName: !Ref CertInventoryTable

  RenewCertificateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: certagent-renew-certificate
      CodeUri: lambdas/renew_certificate/
      Handler: handler.lambda_handler
      Timeout: 120
      Environment:
        Variables:
          DIGICERT_BASE_URL: !Ref DigiCertBaseUrl
      Policies:
        - SecretsManagerReadWrite
        - DynamoDBCrudPolicy:
            TableName: !Ref CertInventoryTable

  CheckStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: certagent-check-status
      CodeUri: lambdas/check_status/
      Handler: handler.lambda_handler
      Environment:
        Variables:
          DIGICERT_BASE_URL: !Ref DigiCertBaseUrl
      Policies:
        - SecretsManagerReadWrite
        - DynamoDBCrudPolicy:
            TableName: !Ref CertInventoryTable

  DownloadCertificateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: certagent-download-certificate
      CodeUri: lambdas/download_certificate/
      Handler: handler.lambda_handler
      Environment:
        Variables:
          DIGICERT_BASE_URL: !Ref DigiCertBaseUrl
      Policies:
        - SecretsManagerReadWrite
        - DynamoDBCrudPolicy:
            TableName: !Ref CertInventoryTable

  StoreCertificateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: certagent-store-certificate
      CodeUri: lambdas/store_certificate/
      Handler: handler.lambda_handler
      Policies:
        - SecretsManagerReadWrite
        - DynamoDBCrudPolicy:
            TableName: !Ref CertInventoryTable

  ListInventoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: certagent-list-inventory
      CodeUri: lambdas/list_inventory/
      Handler: handler.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref CertInventoryTable

  # ─── Slack Integration ────────────────────────────────────
  SlackHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: certagent-slack-handler
      CodeUri: slack/
      Handler: slack_handler.lambda_handler
      Timeout: 120
      Environment:
        Variables:
          BEDROCK_AGENT_ID: TW0X1T4RTT
          BEDROCK_AGENT_ALIAS_ID: TSTALIASID
      Policies:
        - SecretsManagerReadWrite
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeAgent
              Resource: "*"
      Events:
        SlackEvent:
          Type: Api
          Properties:
            Path: /slack/events
            Method: post

  # ─── EventBridge (Daily Scan) ──────────────────────────────
  DailyScanRule:
    Type: AWS::Events::Rule
    Properties:
      Name: certagent-daily-scan
      Description: Trigger daily certificate expiry scan
      ScheduleExpression: cron(0 8 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt ScanCertificatesFunction.Arn
          Id: DailyScan

  DailyScanPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ScanCertificatesFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DailyScanRule.Arn

Outputs:
  ScanFunctionArn:
    Value: !GetAtt ScanCertificatesFunction.Arn
  RenewFunctionArn:
    Value: !GetAtt RenewCertificateFunction.Arn
  InventoryTableName:
    Value: !Ref CertInventoryTable
  NotificationTopicArn:
    Value: !Ref NotificationTopic
  SlackEventUrl:
    Description: URL to configure in Slack Event Subscriptions
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/slack/events"
